# tox.ini — Model Package
# ========================
# Automatiza el entrenamiento, pruebas y construcción del paquete.
#
# Uso:
#   tox run -e train          → entrena y guarda el .pkl
#   tox run -e test_package   → entrena + pruebas unitarias
#
# Después de pasar las pruebas, construir el .whl:
#   python3 -m pip install --upgrade build
#   python3 -m build
#   → genera dist/model_subscription-0.0.1-py3-none-any.whl

[tox]
min_version = 4
envlist = test_package
skipsdist = True

[testenv]
basepython = python
install_command = pip install {opts} {packages}
allowlist_externals = train

setenv =
    PYTHONPATH=.
    PYTHONHASHSEED=0

# ── Ambiente 1: train ─────────────────────────────────────────────────────────
# Solo entrena. Screenshot requerido en el entregable.
[testenv:train]
envdir = {toxworkdir}/test_package
deps =
    -r{toxinidir}/requirements/requirements.txt
commands =
    python model/train_pipeline.py

# ── Ambiente 2: test_package ──────────────────────────────────────────────────
# Entrena + pruebas unitarias. Screenshot requerido en el entregable.
[testenv:test_package]
envdir = {toxworkdir}/test_package
deps =
    -r{toxinidir}/requirements/test_requirements.txt
commands =
    python model/train_pipeline.py
    pytest \
    -s \
    -vv \
    {posargs:tests/}
