# tox.ini
# Automatización de entrenamiento y pruebas del paquete API
#
# Instalar tox:
#   pip install tox
#
# Verificar versión (necesita v4):
#   tox --version
#
# ── Ambientes disponibles ────────────────────────────────────────────────────
#
#   train        → Entrena el modelo y genera el .pkl
#                  tox run -e train
#
#   test_model   → Entrena + pruebas unitarias del modelo (make_prediction)
#                  tox run -e test_model
#
#   test_api     → Entrena + pruebas de integración de los endpoints FastAPI
#                  tox run -e test_api
#
# ── Uso en EC2 (flujo completo del taller) ───────────────────────────────────
#
#   tox run -e train       ← screenshot requerido
#   tox run -e test_api    ← screenshot requerido

[tox]
min_version = 4
envlist = test_model, test_api
skipsdist = True

[testenv]
basepython = python
install_command = pip install {opts} {packages}
allowlist_externals = train

setenv =
    PYTHONPATH=.
    PYTHONHASHSEED=0


# ── Ambiente 1: train ────────────────────────────────────────────────────────
# Solo entrena el modelo. No corre pruebas.
# Útil para re-entrenar cuando cambian los datos o hiperparámetros.
[testenv:train]
envdir = {toxworkdir}/train
deps =
    -r{toxinidir}/requirements/requirements.txt
commands =
    python model/train_pipeline.py


# ── Ambiente 2: test_model ───────────────────────────────────────────────────
# Entrena el modelo y luego corre las pruebas unitarias de make_prediction().
# Equivalente al tox run -e test_package del taller de empaquetamiento.
[testenv:test_model]
envdir = {toxworkdir}/test_model
deps =
    -r{toxinidir}/requirements/test_requirements.txt
commands =
    python model/train_pipeline.py
    pytest \
    -s \
    -vv \
    {posargs:tests/test_model.py}


# ── Ambiente 3: test_api ─────────────────────────────────────────────────────
# Entrena el modelo y corre las pruebas de integración de los endpoints.
# Usa TestClient de FastAPI (no necesita que el servidor esté corriendo).
[testenv:test_api]
envdir = {toxworkdir}/test_api
deps =
    -r{toxinidir}/requirements/test_requirements.txt
commands =
    python model/train_pipeline.py
    pytest \
    -s \
    -vv \
    {posargs:tests/}
